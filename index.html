function getSB(){
  const url=(HARDCODED_URL||(sessionStorage.getItem("sb_url")||"")).trim().replace(/\/+$/,"");
  const key=(HARDCODED_KEY||(sessionStorage.getItem("sb_key")||"")).trim();

function useTheme(){
  const[theme,setTheme]=React.useState(()=>sessionStorage.getItem("ic_theme")||"dark");
  const toggle=React.useCallback(()=>{
    const next=theme==="dark"?"light":"dark";
    setTheme(next);
    sessionStorage.setItem("ic_theme",next);
    document.documentElement.classList.toggle("light",next==="light");
  },[theme]);
  React.useEffect(()=>{
    document.documentElement.classList.toggle("light",theme==="light");
  },[]);
  return[theme,toggle];
}

async function sbFetch(path,method="GET",body=null){
  const{url,key}=getSB();
  const opts={method,headers:{"apikey":key,"Authorization":"Bearer "+key,"Content-Type":"application/json","Prefer":"return=representation"}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url+"/rest/v1/"+path,opts);
  if(!res.ok){
    let msg="";
    try{const j=await res.json();msg=j.message||j.error||JSON.stringify(j);}
    catch(_){msg="HTTP "+res.status;}
    throw new Error(msg);
  }
  const txt=await res.text();
  return txt?JSON.parse(txt):[];
}

/* -- Full DB load from Supabase -- */
async function loadDB(){
  const[users,contributions,trades,prices,history,units]=await Promise.all([
    sbFetch("ic_users?select=*&order=created_at.asc"),
    sbFetch("ic_contributions?select=*&order=date.desc"),
    sbFetch("ic_trades?select=*&order=date.asc"),
    sbFetch("ic_prices?select=*"),
    sbFetch("ic_pricehistory?select=*&order=t.asc"),
    sbFetch("ic_units?select=*").catch(()=>[]),
  ]);
  const pricesMap={};
  prices.forEach(p=>{pricesMap[p.symbol]=p.price;});
  const histMap={};
  history.forEach(h=>{if(!histMap[h.symbol])histMap[h.symbol]=[];histMap[h.symbol].push({t:h.t,p:h.price});});
  const unitsMap={};
  units.forEach(u=>{unitsMap[u.user_id]={units:parseFloat(u.units),avgNav:parseFloat(u.avg_nav),costBasis:parseFloat(u.cost_basis)};});
  const parsedUsers=users.map(u=>({...u,palette:typeof u.palette==="string"?JSON.parse(u.palette):u.palette}));
  return{users:parsedUsers,contributions,trades,prices:pricesMap,priceHistory:histMap,units:unitsMap};
}

async function dbLogin(mob,pw){
  const users=await sbFetch(`ic_users?mobile=eq.${encodeURIComponent(mob)}&select=*`);

  if(u.pw_hash!==btoa(pw))return{ok:false,err:"Incorrect password."};
  const parsed={...u,palette:typeof u.palette==="string"?JSON.parse(u.palette):u.palette};
  return{ok:true,user:parsed};
}

async function dbEditUser(id,{name,mobile,pw}){
  const patch={};
  // Always update name and mobile if provided (not just truthy check)
  if(name!==undefined&&name!==""){
    patch.name=name.trim();
    patch.initials=name.trim().split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  }
  if(mobile!==undefined&&mobile!=="")patch.mobile=mobile.trim();
  // Only update password if a new one was actually typed
  if(pw&&pw.trim().length>=6)patch.pw_hash=btoa(pw.trim());
  if(Object.keys(patch).length===0)return; // nothing to update
  await sbFetch(`ic_users?id=eq.${id}`,"PATCH",patch);
  // If this is the currently logged-in user, update their session too
  try{
    const saved=sessionStorage.getItem("ic_user");
    if(saved){
      const u=JSON.parse(saved);
      if(u.id===id){
        const updated={...u,...patch};
        sessionStorage.setItem("ic_user",JSON.stringify(updated));
      }
    }
  }catch(_){}
}

/* -- Prices -- */
async function dbSetPrice(symbol,price){
  const sym=symbol.toUpperCase();const p=parseFloat(price);
  if(!p||p<=0||isNaN(p))return;
  const existing=await sbFetch(`ic_prices?symbol=eq.${sym}&select=symbol`);
  if(existing.length)await sbFetch(`ic_prices?symbol=eq.${sym}`,"PATCH",{price:p});
  else await sbFetch("ic_prices","POST",{symbol:sym,price:p});
  // prune history: keep last 40
  const hist=await sbFetch(`ic_pricehistory?symbol=eq.${sym}&order=t.asc&select=id,t`);
  if(hist.length>=40){
    const toDelete=hist.slice(0,hist.length-39).map(x=>x.id);
    for(const id of toDelete)await sbFetch(`ic_pricehistory?id=eq.${id}`,"DELETE");
  }
  await sbFetch("ic_pricehistory","POST",{symbol:sym,t:Date.now(),price:p});
}

/* ==============================================================
   CALCULATIONS (same as original - pure JS, no DB calls)
============================================================== */
function calcHoldings(db){
  const map={};
  [...db.trades].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    if(!map[t.symbol])map[t.symbol]={symbol:t.symbol,name:t.name,exchange:t.exchange||"NSE",shares:0,totalCost:0,totalBuyShares:0};
    const m=map[t.symbol];
    if(t.exchange)m.exchange=t.exchange;
    if(t.type==="BUY"){m.shares+=t.shares;m.totalCost+=t.shares*t.price;m.totalBuyShares+=t.shares;}
    else{const avg=m.totalBuyShares>0?m.totalCost/m.totalBuyShares:t.price;m.shares=Math.max(0,m.shares-t.shares);m.totalCost=m.shares*avg;}
  });
  return Object.values(map).filter(h=>h.shares>0).map(h=>{
    const avgPrice=h.totalBuyShares>0?h.totalCost/h.totalBuyShares:0;
    const stored=db.prices[h.symbol];
    const currentPrice=(stored!==undefined&&stored!==null&&parseFloat(stored)>0)?parseFloat(stored):avgPrice;
    return{...h,avgPrice,currentPrice};
  });
}
function calcCash(db){
  const totalContributed=db.contributions.reduce((s,c)=>s+c.amount,0);
  const totalBuySpend=db.trades.filter(t=>t.type==="BUY").reduce((s,t)=>s+t.shares*t.price,0);
  const totalSellReceived=db.trades.filter(t=>t.type==="SELL").reduce((s,t)=>s+t.shares*t.price,0);
  const cash=totalContributed-totalBuySpend+totalSellReceived;
  return{totalContributed,totalBuySpend,totalSellReceived,cash:Math.max(0,cash)};
}
function calcPnL(db){
  const holdings=calcHoldings(db);
  const {totalContributed,totalBuySpend,totalSellReceived,cash}=calcCash(db);
  const currentMV=holdings.reduce((s,h)=>s+h.shares*h.currentPrice,0);
  const currentCost=holdings.reduce((s,h)=>s+h.shares*h.avgPrice,0);
  const unrealizedTotal=currentMV-currentCost;
  const runAvg={};let realizedTotal=0;
  [...db.trades].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    if(!runAvg[t.symbol])runAvg[t.symbol]={shares:0,cost:0};
    const r=runAvg[t.symbol];
    if(t.type==="BUY"){r.cost+=t.shares*t.price;r.shares+=t.shares;}
    else{const avg=r.shares>0?r.cost/r.shares:t.price;realizedTotal+=(t.price-avg)*t.shares;r.shares=Math.max(0,r.shares-t.shares);r.cost=r.shares*avg;}
  });
  const totalPL=realizedTotal+unrealizedTotal;
  // NAV/Unit based P&L
  const totalPoolValue=currentMV+cash;
  const hasUnits=db.units&&Object.keys(db.units).length>0;
  const totalUnits=hasUnits?Object.values(db.units).reduce((s,u)=>s+parseFloat(u.units),0):0;
  const currentNAV=hasUnits&&totalUnits>0?totalPoolValue/totalUnits:0;

  const perUser=db.users.map(u=>{
    const contrib=db.contributions.filter(c=>(c.user_id||c.userId)===u.id).reduce((s,c)=>s+c.amount,0);
    const unitData=hasUnits?db.units[u.id]:null;
    if(unitData&&parseFloat(unitData.units)>0&&currentNAV>0){
      const myUnits=parseFloat(unitData.units);
      const myAvgNav=parseFloat(unitData.avgNav||unitData.avg_nav);
      const myCostBasis=parseFloat(unitData.costBasis||unitData.cost_basis);
      const share=myUnits/totalUnits;
      const currentValue=myUnits*currentNAV;
      const pl=currentValue-myCostBasis;
      const unrealized=share*unrealizedTotal;
      const realized=pl-unrealized;
      const cashShare=share*cash;
      return{user:u,contrib,units:myUnits,avgNav:myAvgNav,costBasis:myCostBasis,
        share,sharePct:(share*100).toFixed(2),pl,realized,unrealized,
        currentValue,cashShare,
        plPct:myCostBasis>0?((pl/myCostBasis)*100).toFixed(2):"0.00",
        currentNAV,isUnitBased:true};
    }
    const share=totalContributed>0?contrib/totalContributed:0;
    const pl=share*totalPL;
    return{user:u,contrib,units:0,avgNav:0,costBasis:contrib,
      share,sharePct:(share*100).toFixed(1),pl,
      realized:share*realizedTotal,unrealized:share*unrealizedTotal,
      currentValue:contrib+pl,cashShare:share*cash,
      plPct:contrib>0?((pl/contrib)*100).toFixed(2):"0.00",
      currentNAV:0,isUnitBased:false};
  });
  return{totalPool:totalContributed,totalBuySpend,totalSellReceived,cash,
    currentMV,currentCost,realizedTotal,unrealizedTotal,totalPL,
    totalPLPct:totalContributed>0?((totalPL/totalContributed)*100).toFixed(2):"0.00",
    currentNAV,totalUnits,hasUnits,perUser,holdings};
}

/* -- Price fetch (Yahoo Finance via allorigins proxy) -- */
function exchSuffix(exch){return(exch||"").toUpperCase()==="BSE"?".BO":".NS";}
// Symbol aliases for Yahoo Finance
const YAHOO_SYMBOL_MAP={"LINDEINDIA":"BOC"};

async function fetchLivePrice(symbol,exchange){
  const sym=symbol.toUpperCase();
  const exch=(exchange||"NSE").toUpperCase();

  // 1st: Try Supabase Edge Function (server-side - no CORS blocks)
  try{
    const sb=getSB();
    const edgeUrl=sb.url+"/functions/v1/fetch-price";
    const res=await fetch(edgeUrl,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+sb.key},
      body:JSON.stringify({symbol:sym,exchange:exch}),
      signal:AbortSignal.timeout(12000),
    });
    if(res.ok){
      const d=await res.json();
      if(d.ok&&d.price>0)return{ok:true,price:d.price,ticker:d.ticker};
    }
  }catch(_){}

  // 2nd: Fallback - browser-side proxy (works for most stocks)
  const suffix=exch==="BSE"?".BO":".NS";
  const yahooSym=YAHOO_SYMBOL_MAP[sym]||sym;
  const tickers=[yahooSym+suffix,yahooSym+(suffix===".NS"?".BO":".NS"),sym+suffix].filter((v,i,a)=>a.indexOf(v)===i);
  const proxies=[
    u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  ];
  for(const ticker of tickers){
    const apiUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d&includePrePost=false`;
    for(const mkProxy of proxies){
      try{
        const res=await fetch(mkProxy(apiUrl),{signal:AbortSignal.timeout(10000)});
        if(!res.ok)continue;
        const j=await res.json();
        const raw=j.contents?JSON.parse(j.contents):j;
        const meta=raw?.chart?.result?.[0]?.meta;
        const p=meta?.regularMarketPrice||meta?.previousClose||meta?.chartPreviousClose;
        if(p&&p>0)return{ok:true,price:parseFloat(p.toFixed(2)),ticker};
      }catch(_){}
    }
  }
  return{ok:false};
}

function exportPersonal(db,user,pnl){
  const me=pnl.perUser.find(u=>u.user.id===user.id)||{};
  const contribs=db.contributions.filter(c=>(c.user_id||c.userId)===user.id).sort((a,b)=>a.date.localeCompare(b.date));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["InvestClub - Personal Statement"],["Member:",user.name],["Mobile:",user.mobile],["Date:",new Date().toLocaleDateString("en-IN")],[],
    ["Contributed","Share %","Portfolio Value","Total P&L","Return %","Cash Share","Realized","Unrealized"],
    [(me.contrib||0).toFixed(2),(me.sharePct||"0")+"%",(me.currentValue||0).toFixed(2),(me.pl||0).toFixed(2),
     (me.plPct||"0")+"%",(me.cashShare||0).toFixed(2),(me.realized||0).toFixed(2),(me.unrealized||0).toFixed(2)],
    [],["=== Contribution History ==="],["Date","Amount","Note"],
    ...contribs.map(c=>[c.date,c.amount,c.note]),
    [],["Total",me.contrib||0],
  ]),"My Statement");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Symbol","Exchange","Shares","Avg Buy","Live Price","My Value","My P&L"],
    ...pnl.holdings.map(h=>{const mv=h.shares*h.currentPrice,cost=h.shares*h.avgPrice,pl=mv-cost,s=me.share||0;
      return[h.symbol,h.exchange,h.shares,h.avgPrice.toFixed(2),h.currentPrice.toFixed(2),(s*mv).toFixed(2),(s*pl).toFixed(2)];}),
  ]),"Holdings");
  XLSX.writeFile(wb,`${user.name.replace(/\s+/g,"_")}_${todayStr()}.xlsx`);
}

        inv.toFixed(2),mv.toFixed(2),pl.toFixed(2),((pl/inv)*100).toFixed(2)+"%"];}),
  ]),"Portfolio");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Type","Symbol","Exchange","Shares","Price","Value","Date","Note"],
    ...db.trades.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>[
      t.type,t.symbol,t.exchange||"NSE",t.shares,t.price,(t.shares*t.price).toFixed(2),t.date,t.note]),
  ]),"Trades");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Member","Amount","Date","Note"],
    ...db.contributions.sort((a,b)=>b.date.localeCompare(a.date)).map(c=>{
      const u=db.users.find(x=>x.id===(c.user_id||c.userId));return[u?.name||"?",c.amount,c.date,c.note];}),
  ]),"Contributions");
  XLSX.writeFile(wb,`InvestClub_Group_${todayStr()}.xlsx`);
}

function Sparkline({data,color,w=70,h=28}){
  const cvs=useRef();
  useEffect(()=>{
    const c=cvs.current;if(!c||!data||data.length<2)return;
    const ctx=c.getContext("2d");c.width=w*2;c.height=h*2;ctx.scale(2,2);
    const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
    const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,color+"55");g.addColorStop(1,color+"00");
    ctx.beginPath();
    data.forEach((v,i)=>{const x=(i/(data.length-1))*w,y=h-(((v-min)/range)*(h-4)+2);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  },[data,color,w,h]);
  return<canvas ref={cvs} style={{width:w,height:h}}/>;
}

function EditSheet({sheet,db,onDone,onClose,show}){
  const{type,data}=sheet;
  const[f,setF]=useState(()=>{
    if(type==="user")return{name:data.name,mobile:data.mobile,pw:""};
    if(type==="contrib")return{userId:data.user_id||data.userId,amount:String(data.amount),date:data.date,note:data.note||""};
    if(type==="trade")return{symbol:data.symbol,name:data.name,exchange:data.exchange||"NSE",type:data.type,shares:String(data.shares),price:String(data.price),date:data.date,note:data.note||""};
    return{};
  });
  const[busy,setBusy]=useState(false);
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const save=async()=>{
    // Validate before saving
    if(type==="user"){
      if(!f.name||f.name.trim().length<2)return show("Name must be at least 2 characters",false);
      if(!f.mobile||f.mobile.replace(/\D/g,"").length<10)return show("Enter valid 10-digit mobile",false);
      if(f.pw&&f.pw.trim().length>0&&f.pw.trim().length<6)return show("Password must be at least 6 characters",false);
    }
    if(type==="contrib"){
      if(!f.amount||parseFloat(f.amount)<=0)return show("Enter valid amount",false);
      if(!f.date)return show("Select a date",false);
    }
    if(type==="trade"){
      if(!f.symbol)return show("Enter stock symbol",false);
      if(!f.shares||parseInt(f.shares)<=0)return show("Enter valid shares",false);
      if(!f.price||parseFloat(f.price)<=0)return show("Enter valid price",false);
    }
    setBusy(true);
    try{
      if(type==="user"){await dbEditUser(data.id,f);show("Member updated");}
      else if(type==="contrib"){await dbEditContrib(data.id,{...f,userId:f.userId||f.user_id});show("Contribution updated");}
      else if(type==="trade"){await dbEditTrade(data.id,f);show("Trade updated");}
      onDone();
    }catch(e){
      show("Save failed: "+e.message,false);
      setBusy(false);
    }
  };
  return(
    <Sheet title={`Edit ${type==="user"?"Member":type==="contrib"?"Contribution":"Trade"}`} onClose={onClose}>
      {type==="user"&&(<>
        <Field label="Full Name" icon="👤" value={f.name} onChange={upd("name")}/>
        <Field label="Mobile Number" icon="📱" type="tel" value={f.mobile} onChange={upd("mobile")}/>
        <Field label="New Password (blank = keep)" icon="🔒" value={f.pw} onChange={upd("pw")} placeholder="Leave blank to keep"/>
      </>)}
      {type==="contrib"&&(<>
        <Sel label="Member" value={f.userId} onChange={upd("userId")}>{db.users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Sel>
        <Field label="Amount (₹)" icon="₹" type="number" value={f.amount} onChange={upd("amount")}/>
        <Field label="Date" icon="📅" type="date" value={f.date} onChange={upd("date")}/>
        <Field label="Note" icon="📝" value={f.note} onChange={upd("note")}/>
      </>)}
      {type==="trade"&&(<>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {["BUY","SELL"].map(t=>(
            <button key={t} onClick={()=>setF(p=>({...p,type:t}))}
              style={{flex:1,padding:"8px",border:`1.5px solid ${f.type===t?(t==="BUY"?"var(--green)":"var(--red)"):"var(--border)"}`,borderRadius:9,background:f.type===t?(t==="BUY"?"var(--green-d)":"var(--red-d)"):"var(--bg)",color:f.type===t?(t==="BUY"?"var(--green-l)":"var(--red-l)"):"var(--text3)",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {t==="BUY"?"📈 BUY":"📉 SELL"}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="Symbol" value={f.symbol} onChange={upd("symbol")}/>
          <Field label="Company" value={f.name} onChange={upd("name")}/>
        </div>
        <ExchangeToggle value={f.exchange} onChange={ex=>setF(p=>({...p,exchange:ex}))} sym={f.symbol}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="Shares" type="number" value={f.shares} onChange={upd("shares")}/>
          <Field label="Price (₹)" type="number" value={f.price} onChange={upd("price")}/>
        </div>
        <Field label="Date" icon="📅" type="date" value={f.date} onChange={upd("date")}/>
        <Field label="Note" icon="📝" value={f.note} onChange={upd("note")}/>
      </>)}
      <Btn full disabled={busy} onClick={save}>{busy?<><span className="spinner"/> Saving...</>:"Save Changes"}</Btn>
    </Sheet>
  );
}

function HoldingsTab({db,pnl,onRefresh,isAdmin}){
  const[refreshing,setRefreshing]=useState(false);
  const[toast,show]=useToast();
  const holdings=pnl.holdings;
  const doRefresh=async()=>{
    setRefreshing(true);
    let updated=0;
    const hs=calcHoldings(db);
    for(const h of hs){
      const r=await fetchLivePrice(h.symbol,h.exchange);
      if(r.ok&&r.price>0){await dbSetPrice(h.symbol,r.price);updated++;}
    }
    if(updated>0){onRefresh();show(`${updated} prices updated`);}
    else show("Could not fetch - last known prices retained",false);
    setRefreshing(false);
  };
  const ist=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
  const day=ist.getDay(),mins=ist.getHours()*60+ist.getMinutes();
  const isOpen=day>=1&&day<=5&&mins>=555&&mins<=930;
  const isWeekend=day===0||day===6;
  return(
    <div style={{padding:"12px 12px 20px",animation:"fadeIn .3s"}}>
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:"10px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:4,background:isOpen?"var(--green)":isWeekend?"var(--text3)":"var(--gold)",animation:isOpen?"blink 1.4s infinite":"none"}}/>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:isOpen?"var(--green)":isWeekend?"var(--text3)":"var(--gold)"}}>
              {isOpen?"Market Open":isWeekend?"Weekend - Closed":"Market Closed"}
            </div>
            <div style={{fontSize:9,color:"var(--text3)"}}>NSE 9:15am-3:30pm IST Mon-Fri</div>
          </div>
        </div>
        <Btn sm color="var(--purple)" disabled={refreshing} onClick={doRefresh}>
          {refreshing?<><span className="spinner"/>...</>:"Refresh"}
        </Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {(()=>{
          const inv=holdings.reduce((s,h)=>s+h.shares*h.avgPrice,0);
          const mv=holdings.reduce((s,h)=>s+h.shares*h.currentPrice,0);
          const pl=mv-inv;
          return[
            {l:"INVESTED",v:"Rs"+inv.toLocaleString("en-IN",{maximumFractionDigits:0}),c:"var(--text)"},
            {l:"MKT VALUE",v:"Rs"+mv.toLocaleString("en-IN",{maximumFractionDigits:0}),c:"var(--blue)"},
            {l:"UNREALIZED",v:(pl>=0?"+":"-")+"Rs"+Math.abs(pl).toLocaleString("en-IN",{maximumFractionDigits:0}),c:pl>=0?"var(--green)":"var(--red)"},
          ];
        })().map(m=>(
          <div key={m.l} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 10px"}}>
            <div style={{fontSize:8,color:"var(--text3)",fontFamily:"monospace",marginBottom:3}}>{m.l}</div>
            <div style={{fontSize:12,fontWeight:700,color:m.c}}>{m.v}</div>
          </div>
        ))}
      </div>
      {holdings.length===0&&<div style={{textAlign:"center",color:"var(--text3)",padding:40,fontSize:14}}>No current holdings</div>}
      {holdings.map(h=>{
        const inv=h.shares*h.avgPrice,mv=h.shares*h.currentPrice,pl=mv-inv;
        const pct=((h.currentPrice-h.avgPrice)/h.avgPrice*100);
        const up=pl>=0;
        const hist=(db.priceHistory[h.symbol]||[]).map(x=>x.p);
        if(hist.length<2)hist.push(h.avgPrice,h.currentPrice);
        return(
          <div key={h.symbol} style={{background:"var(--bg2)",border:`1px solid ${up?"var(--green)":"var(--red)"}33`,borderRadius:14,padding:"14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:15,fontWeight:700,color:"var(--text)",fontFamily:"monospace"}}>{h.symbol}</span>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:8,background:h.exchange==="NSE"?"#0d3d1a":"#0d1a3d",color:h.exchange==="NSE"?"#5eedb0":"#7fb3ff"}}>{h.exchange}</span>
                </div>
                <div style={{fontSize:11,color:"var(--text3)"}}>{h.name}</div>
              </div>
              <Sparkline data={hist} color={up?"#2ecc8a":"#f75f5f"} w={80} h={32}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
              {[
                {l:"SHARES",v:h.shares,c:"var(--text)"},
                {l:"AVG BUY",v:"Rs"+h.avgPrice.toFixed(2),c:"var(--text2)"},
                {l:"LIVE",v:"Rs"+h.currentPrice.toFixed(2),c:"var(--text)"},
                {l:"CHANGE",v:(pct>=0?"+":"")+pct.toFixed(2)+"%",c:up?"var(--green)":"var(--red)"},
              ].map(x=>(
                <div key={x.l} style={{background:"var(--bg3)",borderRadius:8,padding:"7px 8px"}}>
                  <div style={{fontSize:8,color:"var(--text3)",fontFamily:"monospace",marginBottom:2}}>{x.l}</div>
                  <div style={{fontSize:11,fontWeight:700,color:x.c}}>{x.v}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:"1px solid var(--border)"}}>
              <span style={{fontSize:11,color:"var(--text3)"}}>Invested: <b style={{color:"var(--text)"}}>Rs{inv.toLocaleString("en-IN",{maximumFractionDigits:0})}</b></span>
              <span style={{fontSize:11,color:"var(--text3)"}}>Value: <b style={{color:"var(--blue)"}}>Rs{mv.toLocaleString("en-IN",{maximumFractionDigits:0})}</b></span>
              <span style={{fontSize:13,fontWeight:700,color:up?"var(--green)":"var(--red)"}}>{up?"+":"-"}Rs{Math.abs(pl).toLocaleString("en-IN",{maximumFractionDigits:0})}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

            {l:"Unrealized",v:(me.unrealized>=0?"+":"-")+fmt(me.unrealized),c:plColor(me.unrealized),bg:"var(--blue-d)"},
            {l:"Cash Share",v:fmt(me.cashShare),c:"var(--gold)",bg:"var(--gold-d)"},
          ].map(m=>(
            <div key={m.l} style={{background:m.bg,borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{m.l}</div>
              <div style={{fontSize:12,fontWeight:700,color:m.c,marginTop:2}}>{m.v}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card>
        <Lbl>Download Reports</Lbl>
        {[
          {icon:"📄",title:"My Personal Statement",sub:"My contributions, P&L, return % - XLSX",color:"var(--green)",fn:()=>{exportPersonal(db,user,pnl);show("Downloaded v");}},
          {icon:"📊",title:"Group Report",sub:"All members P&L + portfolio - XLSX",color:"var(--blue)",fn:()=>{exportGroup(db,pnl);show("Downloaded v");}},
        ].map(r=>(
          <button key={r.title} onClick={r.fn} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 13px",background:"var(--bg3)",border:`1px solid ${r.color}33`,borderRadius:12,cursor:"pointer",textAlign:"left",width:"100%",marginBottom:8}}>
            <div style={{width:36,height:36,borderRadius:9,background:r.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{r.icon}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{r.title}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:1}}>{r.sub}</div></div>
            <span style={{fontSize:10,fontWeight:700,color:r.color,border:`1px solid ${r.color}44`,padding:"3px 9px",borderRadius:15}}>DL XLSX</span>
          </button>
        ))}
      </Card>
      <Card>
        <Lbl>My Contributions</Lbl>
        {myContribs.length===0&&<div style={{textAlign:"center",color:"var(--text3)",fontSize:13,padding:"14px 0"}}>No contributions yet</div>}
        {myContribs.map((c,i)=>(
          <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<myContribs.length-1?"1px solid var(--border)":"none"}}>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{c.date}</div>
              {c.note&&<div style={{fontSize:10,color:"var(--text3)",marginTop:1}}>{c.note}</div>}
            </div>
            <div style={{fontSize:13,fontWeight:700,color:"var(--green)",fontFamily:"'DM Mono',monospace"}}>+{fmt(c.amount)}</div>
          </div>
        ))}
        {myContribs.length>0&&(
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)"}}>
            <span style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>Total</span>
            <span style={{fontSize:14,fontWeight:700,color:"var(--blue)",fontFamily:"'DM Mono',monospace"}}>{fmt(me.contrib)}</span>
          </div>
        )}
      </Card>
      <Btn ghost full color="var(--red)" onClick={onLogout} style={{marginBottom:8}}>Sign Out</Btn>
      <Btn ghost full color="var(--text3)" onClick={onDisconnect} style={{fontSize:12}}>* Change Supabase Connection</Btn>
    </div>
  );
}

/* ==============================================================
   APP ROOT
============================================================== */
function App(){
  const[sbReady,setSbReady]=React.useState(getSB().ready);
  const[db,setDB]=React.useState(null);
  const[user,setUser]=React.useState(getSavedUser);
  const[tab,setTab]=React.useState("home");
  const[loading,setLoading]=React.useState(false);
  const[needsSetup,setNeedsSetup]=React.useState(false);
  const[theme,toggleTheme]=useTheme();
  const[appError,setAppError]=React.useState(null);

  const refresh=React.useCallback(async()=>{
    try{const d=await loadDB();setDB(d);}catch(e){console.error("refresh error",e);}
  },[]);

  React.useEffect(()=>{
    if(!sbReady)return;
    (async()=>{
      setLoading(true);
      setAppError(null);
      try{
        await dbEnsureAdmin();
        const setup=await dbCheckSetup();
        setNeedsSetup(setup);
        const d=await loadDB();
        setDB(d);
      }catch(e){
        console.error("Load error:",e);
        setAppError(e.message||"Failed to load. Check Supabase connection.");
      }
      setLoading(false);
    })();
  },[sbReady]);

  const pnl=React.useMemo(()=>db?calcPnL(db):{totalPool:0,totalBuySpend:0,totalSellReceived:0,cash:0,currentMV:0,currentCost:0,realizedTotal:0,unrealizedTotal:0,totalPL:0,totalPLPct:"0.00",currentNAV:0,totalUnits:0,hasUnits:false,perUser:[],holdings:[]},[db]);
  const isAdmin=user?.role==="admin";

  React.useEffect(()=>{
    if(!user||!db)return;
    const realFetch=async()=>{
      const holdings=calcHoldings(db);
      if(!holdings.length)return;
      let updated=false;
      for(const h of holdings){
        const res=await fetchLivePrice(h.symbol,h.exchange);
        if(res.ok&&res.price>0){await dbSetPrice(h.symbol,res.price);updated=true;}
      }
      if(updated)refresh();
    };
    realFetch();
    const realId=setInterval(()=>{
      const ist=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
      const day=ist.getDay(),mins=ist.getHours()*60+ist.getMinutes();
      if(day>=1&&day<=5&&mins>=555&&mins<=930)realFetch();
    },300000);
    return()=>clearInterval(realId);
  },[user]);

  const tabs=[
    {id:"home",label:"Home",icon:"🏠"},
    {id:"holdings",label:"Holdings",icon:"📈"},
    {id:"trades",label:"Trades",icon:"🔄"},
    {id:"contribs",label:"Funds",icon:"💰"},
    {id:"pnl",label:"P&L",icon:"📊"},
    ...(isAdmin?[{id:"admin",label:"Admin",icon:"*"}]:[]),
    {id:"account",label:"Me",icon:"👤"},
  ];

  if(!sbReady)return React.createElement(SupabaseSetup,{onReady:()=>setSbReady(true)});
  if(appError)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:24,gap:16}}>
      <div style={{fontSize:28}}>[!]</div>
      <div style={{fontSize:15,fontWeight:700,color:"var(--red-l)",textAlign:"center"}}>Connection Error</div>
      <div style={{fontSize:12,color:"var(--text3)",textAlign:"center",background:"var(--bg2)",padding:"12px 16px",borderRadius:10,border:"1px solid var(--red)44",maxWidth:340,wordBreak:"break-all"}}>{appError}</div>
      <button onClick={()=>{sessionStorage.removeItem("sb_url");sessionStorage.removeItem("sb_key");setSbReady(false);setAppError(null);}}
        style={{padding:"10px 24px",background:"var(--blue)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:700}}>
        Re-enter Supabase Credentials
      </button>
    </div>
  );
  if(loading&&!db)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",gap:12}}>
      <span className="spinner" style={{width:32,height:32,borderWidth:3}}/>
      <div style={{fontSize:13,color:"var(--text3)"}}>Loading InvestClub...</div>
    </div>
  );
  if(needsSetup)return<SetupScreen onDone={async()=>{setNeedsSetup(false);await refresh();}}/>;
  if(!user)return<LoginScreen onLogin={u=>{sessionStorage.setItem("ic_user",JSON.stringify(u));setUser(u);setTab("home");}}/>;

  return(
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>
      <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"12px 16px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:"var(--text)",letterSpacing:-.3}}>InvestClub</div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:1,fontFamily:"'DM Mono',monospace"}}>
            <span style={{display:"inline-block",width:5,height:5,borderRadius:3,background:"var(--green)",marginRight:4,animation:"blink 1.4s infinite"}}/>
            {db?.users?.length||0} members, {pnl.holdings.length} stocks
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginBottom:1}}>GROUP P&L</div>
            <div style={{fontSize:14,fontWeight:700,color:plColor(pnl.totalPL),fontFamily:"'DM Mono',monospace"}}>{plSign(pnl.totalPL)}{fmt(pnl.totalPL)}</div>
            <div style={{fontSize:9,color:"var(--gold)"}}>Cash: {fmt(pnl.cash)}</div>
          </div>
          <button onClick={toggleTheme}
            style={{padding:"6px 10px",borderRadius:16,border:"1px solid var(--border2)",
              background:"var(--bg3)",cursor:"pointer",fontSize:11,fontWeight:700,
              color:"var(--text2)"}}>
            {theme==="dark"?"Day Mode":"Night Mode"}
          </button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",paddingBottom:68}}>
        {tab==="home"&&db&&<Dashboard db={db} user={user} pnl={pnl}/>}
        {tab==="holdings"&&db&&<HoldingsTab db={db} pnl={pnl} onRefresh={refresh} isAdmin={isAdmin}/>}
        {tab==="trades"&&db&&<TradesTab db={db} onUpdate={refresh} isAdmin={isAdmin}/>}
        {tab==="contribs"&&db&&<ContribTab db={db} onUpdate={refresh} isAdmin={isAdmin} user={user}/>}
        {tab==="pnl"&&<PnLTab pnl={pnl} user={user}/>}
        {tab==="admin"&&isAdmin&&db&&<AdminPanel db={db} onUpdate={refresh}/>}
        {tab==="account"&&db&&<AccountTab db={db} user={user} pnl={pnl}
          onLogout={()=>{sessionStorage.removeItem("ic_user");setUser(null);}}
          onDisconnect={()=>{["sb_url","sb_key","ic_user","ic_theme"].forEach(k=>sessionStorage.removeItem(k));setSbReady(false);setUser(null);setDB(null);}}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"var(--bg2)",borderTop:"1px solid var(--border)",display:"flex",zIndex:20}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:"9px 0 11px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
              borderTop:`2px solid ${tab===t.id?"var(--blue)":"transparent"}`,
              color:tab===t.id?"var(--blue)":"var(--text3)",transition:"color .15s"}}>
            <span style={{fontSize:17}}>{t.icon}</span>
            <span style={{fontSize:8,fontWeight:700,letterSpacing:.4,fontFamily:"'DM Mono',monospace"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// -- PWA Install Prompt --
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();deferredPrompt=e;showInstallBanner();
});
function showInstallBanner(){
  if(document.getElementById("ic-install-banner"))return;
  const banner=document.createElement("div");
  banner.id="ic-install-banner";
  banner.innerHTML=`<div style="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:388px;background:linear-gradient(135deg,#1a3a7a,#0d3d28);border:1px solid #4f8ef7;border-radius:14px;padding:14px 16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.6);display:flex;align-items:center;gap:12px;animation:fadeIn .3s"><span style="font-size:28px;flex-shrink:0">📲</span><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#f0f2ff">Install InvestClub</div><div style="font-size:11px;color:#9ba3c4;margin-top:2px">Add to home screen for app-like experience</div></div><button onclick="installApp()" style="padding:8px 14px;background:#4f8ef7;color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">Install</button><button onclick="dismissBanner()" style="background:none;border:none;color:#636b8a;cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0">✕</button></div>`;
  document.body.appendChild(banner);
}
window.installApp=async function(){if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;deferredPrompt=null;dismissBanner();};
window.dismissBanner=function(){const b=document.getElementById("ic-install-banner");if(b)b.remove();};
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone=window.navigator.standalone===true;
const dismissed=sessionStorage.getItem("ic-ios-dismissed");
if(isIOS&&!isInStandalone&&!dismissed){setTimeout(()=>{
  if(document.getElementById("ic-install-banner"))return;
  const banner=document.createElement("div");banner.id="ic-install-banner";
  banner.innerHTML=`<div style="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:388px;background:linear-gradient(135deg,#1a3a7a,#0d3d28);border:1px solid #4f8ef7;border-radius:14px;padding:14px 16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:fadeIn .3s"><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><span style="font-size:26px">📲</span><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#f0f2ff">Install on iPhone</div><div style="font-size:11px;color:#9ba3c4;margin-top:2px">Open in Safari to install</div></div><button onclick="sessionStorage.setItem('ic-ios-dismissed','1');dismissBanner()" style="background:none;border:none;color:#636b8a;cursor:pointer;font-size:18px">✕</button></div><div style="background:#0f1117;border-radius:9px;padding:10px 12px;font-size:12px;color:#9ba3c4;line-height:1.7">1. Tap the <strong style="color:#4f8ef7">Share</strong> button <strong style="color:#f0f2ff">[share]</strong> in Safari<br/>2. Scroll down and tap <strong style="color:#4f8ef7">"Add to Home Screen"</strong><br/>3. Tap <strong style="color:#4f8ef7">"Add"</strong> - InvestClub appears on your home screen 🎉</div></div>`;
  document.body.appendChild(banner);
},2000);}
if("serviceWorker" in navigator){
  const swCode="const CACHE='investclub-v3';self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/']))));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));";
  const blob=new Blob([swCode],{type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
