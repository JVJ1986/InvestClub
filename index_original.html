const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ═══════════════════════════════ DATABASE ════════════════════════════════ */
const DB_KEY="ic_v5";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const todayStr=()=>new Date().toISOString().split("T")[0];

const PAL=[
  {bg:"#1a2e4a",text:"#7fb3ff",bar:"#4f8ef7"},
  {bg:"#0d3328",text:"#5eedb0",bar:"#2ecc8a"},
  {bg:"#3a1a0a",text:"#ffb97a",bar:"#f5a623"},
  {bg:"#2a0d2d",text:"#d98aff",bar:"#a855f7"},
  {bg:"#1a2a0a",text:"#aaef7a",bar:"#6dbf2e"},
  {bg:"#2d1a0a",text:"#ffcc7a",bar:"#e8a020"},
  {bg:"#0d1a3a",text:"#7adcff",bar:"#22b8e0"},
  {bg:"#2a0a1a",text:"#ff9fc0",bar:"#e0558a"},
];

const SEED={
  users:[{id:"u_admin",mobile:"",pwHash:"",needsSetup:true,
    name:"Admin",initials:"AD",role:"admin",joinedAt:"2024-01-01",palette:PAL[0]}],
  contributions:[],  // {id,userId,amount,date,note}
  trades:[],         // {id,symbol,name,exchange,type,shares,price,date,note}
  prices:{},         // symbol → live price
  priceHistory:{},   // symbol → [{t,p}] (last 40)
  exchanges:{},      // symbol → "NSE"|"BSE"
};

function loadDB(){
  try{const r=localStorage.getItem(DB_KEY);if(r)return JSON.parse(r);}catch(_){}
  const db=JSON.parse(JSON.stringify(SEED));saveDB(db);return db;
}
function saveDB(db){try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(_){}}

/* ── Auth ── */
function dbLogin(db,mob,pw){
  const u=db.users.find(x=>x.mobile===mob);
  if(!u)return{ok:false,err:"Mobile number not registered."};
  if(u.pwHash!==btoa(pw))return{ok:false,err:"Incorrect password."};
  return{ok:true,user:u};
}
function dbAddUser(db,{mobile,pw,name}){
  if(db.users.find(u=>u.mobile===mobile))return{ok:false,err:"Mobile already registered."};
  const p=PAL[db.users.length%PAL.length];
  const u={id:"u_"+uid(),mobile,pwHash:btoa(pw),name,
    initials:name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
    role:"member",joinedAt:todayStr(),palette:p};
  db.users.push(u);saveDB(db);return{ok:true,user:u};
}
function dbEditUser(db,id,{name,mobile,pw}){
  const u=db.users.find(x=>x.id===id);if(!u)return;
  if(name)u.name=name;
  if(mobile)u.mobile=mobile;
  if(pw)u.pwHash=btoa(pw);
  u.initials=u.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  saveDB(db);
}
function dbDeleteUser(db,id){
  if(id==="u_admin")return false;
  db.users=db.users.filter(u=>u.id!==id);
  db.contributions=db.contributions.filter(c=>c.userId!==id);
  saveDB(db);return true;
}

/* ── Contributions ── */
function dbAddContrib(db,{userId,amount,date,note}){
  const c={id:"c_"+uid(),userId,amount:parseFloat(amount),date,note:note||"",createdAt:new Date().toISOString()};
  db.contributions.push(c);saveDB(db);return c;
}
function dbEditContrib(db,id,{userId,amount,date,note}){
  const c=db.contributions.find(x=>x.id===id);if(!c)return;
  if(userId)c.userId=userId;
  if(amount!==undefined)c.amount=parseFloat(amount);
  if(date)c.date=date;
  if(note!==undefined)c.note=note;
  saveDB(db);
}
function dbDeleteContrib(db,id){db.contributions=db.contributions.filter(c=>c.id!==id);saveDB(db);}

/* ── Trades ── */
function dbAddTrade(db,{symbol,name,exchange,type,shares,price,date,note}){
  const sym=symbol.toUpperCase(),exch=(exchange||"NSE").toUpperCase();
  const t={id:"t_"+uid(),symbol:sym,name:name||sym,exchange:exch,type,
    shares:parseInt(shares),price:parseFloat(price),date,note:note||"",createdAt:new Date().toISOString()};
  db.trades.push(t);
  if(!db.exchanges)db.exchanges={};
  db.exchanges[sym]=exch;
  if(db.prices[sym]===undefined)db.prices[sym]=t.price;
  if(!db.priceHistory[sym])db.priceHistory[sym]=[];
  saveDB(db);return t;
}
function dbEditTrade(db,id,{symbol,name,exchange,type,shares,price,date,note}){
  const t=db.trades.find(x=>x.id===id);if(!t)return;
  if(symbol)t.symbol=symbol.toUpperCase();
  if(name)t.name=name;
  if(exchange){t.exchange=exchange.toUpperCase();if(!db.exchanges)db.exchanges={};db.exchanges[t.symbol]=exchange.toUpperCase();}
  if(type)t.type=type;
  if(shares)t.shares=parseInt(shares);
  if(price)t.price=parseFloat(price);
  if(date)t.date=date;
  if(note!==undefined)t.note=note;
  saveDB(db);
}
function dbDeleteTrade(db,id){db.trades=db.trades.filter(t=>t.id!==id);saveDB(db);}

/* ── Prices ── */
function dbSetPrice(db,symbol,price){
  const sym=symbol.toUpperCase(),p=parseFloat(price);
  db.prices[sym]=p;
  if(!db.priceHistory[sym])db.priceHistory[sym]=[];
  db.priceHistory[sym].push({t:Date.now(),p});
  if(db.priceHistory[sym].length>40)db.priceHistory[sym]=db.priceHistory[sym].slice(-40);
  saveDB(db);
}

/* ── Holdings ── */
function calcHoldings(db){
  const map={};
  [...db.trades].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    if(!map[t.symbol])map[t.symbol]={symbol:t.symbol,name:t.name,exchange:t.exchange||"NSE",shares:0,totalCost:0,totalBuyShares:0};
    const m=map[t.symbol];
    if(t.exchange)m.exchange=t.exchange;
    if(t.type==="BUY"){m.shares+=t.shares;m.totalCost+=t.shares*t.price;m.totalBuyShares+=t.shares;}
    else{const avg=m.totalBuyShares>0?m.totalCost/m.totalBuyShares:t.price;m.shares=Math.max(0,m.shares-t.shares);m.totalCost=m.shares*avg;}
  });
  return Object.values(map).filter(h=>h.shares>0).map(h=>({
    ...h,
    avgPrice:h.totalBuyShares>0?h.totalCost/h.totalBuyShares:0,
    currentPrice:db.prices[h.symbol]!==undefined?db.prices[h.symbol]:h.totalCost/Math.max(h.totalBuyShares,1),
  }));
}

/* ── Cash: contributed minus what we actually paid for stocks, plus sell proceeds ── */
function calcCash(db){
  const totalContributed=db.contributions.reduce((s,c)=>s+c.amount,0);
  const totalBuySpend=db.trades.filter(t=>t.type==="BUY").reduce((s,t)=>s+t.shares*t.price,0);
  const totalSellReceived=db.trades.filter(t=>t.type==="SELL").reduce((s,t)=>s+t.shares*t.price,0);
  const cash=totalContributed-totalBuySpend+totalSellReceived;
  return{totalContributed,totalBuySpend,totalSellReceived,cash:Math.max(0,cash)};
}

/* ── P&L Engine ── */
function calcPnL(db){
  const holdings=calcHoldings(db);
  const {totalContributed,totalBuySpend,totalSellReceived,cash}=calcCash(db);
  const currentMV=holdings.reduce((s,h)=>s+h.shares*h.currentPrice,0);
  const currentCost=holdings.reduce((s,h)=>s+h.shares*h.avgPrice,0);
  const unrealizedTotal=currentMV-currentCost;

  // Realized P&L from SELL trades (sell price - avg cost at time of sell)
  const runAvg={};let realizedTotal=0;
  [...db.trades].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    if(!runAvg[t.symbol])runAvg[t.symbol]={shares:0,cost:0};
    const r=runAvg[t.symbol];
    if(t.type==="BUY"){r.cost+=t.shares*t.price;r.shares+=t.shares;}
    else{const avg=r.shares>0?r.cost/r.shares:t.price;realizedTotal+=(t.price-avg)*t.shares;r.shares=Math.max(0,r.shares-t.shares);r.cost=r.shares*avg;}
  });
  const totalPL=realizedTotal+unrealizedTotal;

  const perUser=db.users.map(u=>{
    const contrib=db.contributions.filter(c=>c.userId===u.id).reduce((s,c)=>s+c.amount,0);
    const share=totalContributed>0?contrib/totalContributed:0;
    const pl=share*totalPL;
    return{user:u,contrib,share,sharePct:(share*100).toFixed(1),
      pl,realized:share*realizedTotal,unrealized:share*unrealizedTotal,
      currentValue:contrib+pl,cashShare:share*cash,
      plPct:contrib>0?((pl/contrib)*100).toFixed(2):"0.00"};
  });

  return{totalPool:totalContributed,totalBuySpend,totalSellReceived,cash,
    currentMV,currentCost,realizedTotal,unrealizedTotal,totalPL,
    totalPLPct:totalContributed>0?((totalPL/totalContributed)*100).toFixed(2):"0.00",
    perUser,holdings};
}

/* ── Price fetch (Yahoo Finance via allorigins proxy) ── */
function exchSuffix(exch){return(exch||"").toUpperCase()==="BSE"?".BO":".NS";}

async function fetchLivePrice(symbol,exchange){
  const suffix=exchSuffix(exchange);
  const sym=symbol.toUpperCase();
  // try chosen exchange, fallback to other
  const attempts=[sym+suffix, sym+(suffix===".NS"?".BO":".NS")];
  for(const yTicker of attempts){
    try{
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${yTicker}?interval=1d&range=1d`;
      const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const res=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
      const j=await res.json();
      const meta=JSON.parse(j.contents)?.chart?.result?.[0]?.meta;
      const p=meta?.regularMarketPrice||meta?.previousClose;
      if(p&&p>0)return{ok:true,price:p,ticker:yTicker};
    }catch(_){}
  }
  return{ok:false};
}

/* ── Exports ── */
function exportPersonal(db,user,pnl){
  const me=pnl.perUser.find(u=>u.user.id===user.id)||{};
  const contribs=db.contributions.filter(c=>c.userId===user.id).sort((a,b)=>a.date.localeCompare(b.date));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["InvestClub — Personal Statement"],["Member:",user.name],["Mobile:",user.mobile],["Date:",new Date().toLocaleDateString("en-IN")],[],
    ["Contributed","Share %","Portfolio Value","Total P&L","Return %","Cash Share","Realized","Unrealized"],
    [(me.contrib||0).toFixed(2),(me.sharePct||"0")+"%",(me.currentValue||0).toFixed(2),(me.pl||0).toFixed(2),
     (me.plPct||"0")+"%",(me.cashShare||0).toFixed(2),(me.realized||0).toFixed(2),(me.unrealized||0).toFixed(2)],
    [],["=== Contribution History ==="],["Date","Amount","Note"],
    ...contribs.map(c=>[c.date,c.amount,c.note]),
    [],["Total",me.contrib||0],
  ]),"My Statement");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Symbol","Exchange","Shares","Avg Buy","Live Price","My Value","My P&L"],
    ...pnl.holdings.map(h=>{const mv=h.shares*h.currentPrice,cost=h.shares*h.avgPrice,pl=mv-cost,s=me.share||0;
      return[h.symbol,h.exchange,h.shares,h.avgPrice.toFixed(2),h.currentPrice.toFixed(2),(s*mv).toFixed(2),(s*pl).toFixed(2)];}),
  ]),"Holdings");
  XLSX.writeFile(wb,`${user.name.replace(/\s+/g,"_")}_${todayStr()}.xlsx`);
}
function exportGroup(db,pnl){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Name","Contributed","Share %","Value","P&L","Return %","Cash Share","Realized","Unrealized"],
    ...pnl.perUser.filter(u=>u.contrib>0).sort((a,b)=>b.pl-a.pl).map(u=>[
      u.user.name,u.contrib.toFixed(2),u.sharePct+"%",u.currentValue.toFixed(2),
      u.pl.toFixed(2),u.plPct+"%",u.cashShare.toFixed(2),u.realized.toFixed(2),u.unrealized.toFixed(2)]),
    [],["TOTAL",pnl.totalPool.toFixed(2),"",pnl.currentMV.toFixed(2),pnl.totalPL.toFixed(2),
      pnl.totalPLPct+"%",pnl.cash.toFixed(2)],
  ]),"Members P&L");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Symbol","Exchange","Shares","Avg Price","Live Price","Invested","Market Value","Unrealized P&L","Return %"],
    ...pnl.holdings.map(h=>{const inv=h.shares*h.avgPrice,mv=h.shares*h.currentPrice,pl=mv-inv;
      return[h.symbol,h.exchange,h.shares,h.avgPrice.toFixed(2),h.currentPrice.toFixed(2),
        inv.toFixed(2),mv.toFixed(2),pl.toFixed(2),((pl/inv)*100).toFixed(2)+"%"];}),
  ]),"Portfolio");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Type","Symbol","Exchange","Shares","Price","Value","Date","Note"],
    ...db.trades.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>[
      t.type,t.symbol,t.exchange||"NSE",t.shares,t.price,(t.shares*t.price).toFixed(2),t.date,t.note]),
  ]),"Trades");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Member","Amount","Date","Note"],
    ...db.contributions.sort((a,b)=>b.date.localeCompare(a.date)).map(c=>{
      const u=db.users.find(x=>x.id===c.userId);return[u?.name||"?",c.amount,c.date,c.note];}),
  ]),"Contributions");
  XLSX.writeFile(wb,`InvestClub_Group_${todayStr()}.xlsx`);
}

/* ═══════════════════════════════ UI PRIMITIVES ════════════════════════════════ */
const fmt=n=>"₹"+Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtF=n=>"₹"+Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});
const plColor=n=>n>=0?"var(--green)":"var(--red)";
const plSign=n=>n>=0?"+":"-";

function Avatar({user,size=38}){
  const p=user.palette||PAL[0];
  return<div style={{width:size,height:size,borderRadius:size/2,background:p.bg,color:p.text,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.34,fontWeight:700,flexShrink:0,border:`1.5px solid ${p.bar}55`}}>{user.initials}</div>;
}
function Pill({c,bg,children}){return<span style={{fontSize:10,fontWeight:700,letterSpacing:.4,padding:"2px 8px",borderRadius:20,background:bg||(c+"22"),color:c,fontFamily:"'DM Mono',monospace"}}>{children}</span>;}
function Card({children,style={}}){return<div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 16px",marginBottom:10,...style}}>{children}</div>;}
function Lbl({children,style={}}){return<div style={{fontSize:10,fontWeight:700,letterSpacing:.8,color:"var(--text3)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Mono',monospace",...style}}>{children}</div>;}

}
function Sel({label,value,onChange,children}){
  return(
    <div style={{marginBottom:10}}>
      {label&&<label style={{fontSize:11,color:"var(--text2)",display:"block",marginBottom:4,fontWeight:500}}>{label}</label>}
      <select value={value} onChange={onChange} style={{width:"100%",padding:"10px 12px",border:"1px solid var(--border2)",borderRadius:9,background:"var(--bg3)",color:"var(--text)",fontSize:14,outline:"none"}}>{children}</select>
    </div>

function Btn({children,onClick,color="var(--blue)",ghost,sm,disabled,full,style={}}){
  return<button onClick={onClick} disabled={disabled} style={{padding:sm?"7px 14px":"11px 18px",background:ghost?"transparent":color,color:ghost?color:"#fff",border:`1.5px solid ${color}`,borderRadius:9,fontSize:sm?12:14,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,width:full?"100%":"auto",...style}}>{children}</button>;
}
function Toast({msg,ok=true}){
  return<div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",background:"var(--bg3)",border:`1px solid ${ok?"var(--green)":"var(--red)"}`,color:ok?"var(--green-l)":"var(--red-l)",padding:"9px 18px",borderRadius:30,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,.7)",whiteSpace:"nowrap",animation:"fadeIn .2s"}}>{msg}</div>;
}
function useToast(){
  const[t,setT]=useState(null);
  const show=(msg,ok=true)=>{setT({msg,ok});setTimeout(()=>setT(null),2600);};
  return[t,show];
}
function Confirm({msg,onYes,onNo}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20}}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:24,maxWidth:320,width:"100%",animation:"fadeIn .2s"}}>

/* ── Sparkline ── */
function Sparkline({data,color,w=70,h=28}){
  const cvs=useRef();
  useEffect(()=>{
    const c=cvs.current;if(!c||!data||data.length<2)return;
    const ctx=c.getContext("2d");c.width=w*2;c.height=h*2;ctx.scale(2,2);
    const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
    const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,color+"55");g.addColorStop(1,color+"00");
    ctx.beginPath();
    data.forEach((v,i)=>{const x=(i/(data.length-1))*w,y=h-(((v-min)/range)*(h-4)+2);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  },[data,color,w,h]);
  return<canvas ref={cvs} style={{width:w,height:h}}/>;
}

    if(type==="trade")return{symbol:data.symbol,name:data.name,exchange:data.exchange||"NSE",type:data.type,shares:String(data.shares),price:String(data.price),date:data.date,note:data.note||""};
    return{};
  });
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const save=()=>{
    if(type==="user"){dbEditUser(db,data.id,f);show("Member updated ✓");}
    else if(type==="contrib"){dbEditContrib(db,data.id,f);show("Contribution updated ✓");}
    else if(type==="trade"){dbEditTrade(db,data.id,f);show("Trade updated ✓");}
    onDone();
  };
  return(
    <Sheet title={`Edit ${type==="user"?"Member":type==="contrib"?"Contribution":"Trade"}`} onClose={onClose}>
      {type==="user"&&(<>
        <Field label="Full Name" icon="👤" value={f.name} onChange={upd("name")}/>
        <Field label="Mobile Number" icon="📱" type="tel" value={f.mobile} onChange={upd("mobile")}/>
        <Field label="New Password (blank = keep)" icon="🔒" value={f.pw} onChange={upd("pw")} placeholder="Leave blank to keep"/>
      </>)}
      {type==="contrib"&&(<>
        <Sel label="Member" value={f.userId} onChange={upd("userId")}>{db.users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Sel>
        <Field label="Amount (₹)" icon="₹" type="number" value={f.amount} onChange={upd("amount")}/>
        <Field label="Date" icon="📅" type="date" value={f.date} onChange={upd("date")}/>
        <Field label="Note" icon="📝" value={f.note} onChange={upd("note")}/>
      </>)}
      {type==="trade"&&(<>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {["BUY","SELL"].map(t=>(
            <button key={t} onClick={()=>setF(p=>({...p,type:t}))}
              style={{flex:1,padding:"8px",border:`1.5px solid ${f.type===t?(t==="BUY"?"var(--green)":"var(--red)"):"var(--border)"}`,borderRadius:9,background:f.type===t?(t==="BUY"?"var(--green-d)":"var(--red-d)"):"var(--bg)",color:f.type===t?(t==="BUY"?"var(--green-l)":"var(--red-l)"):"var(--text3)",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {t==="BUY"?"📈 BUY":"📉 SELL"}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="Symbol" value={f.symbol} onChange={upd("symbol")}/>
          <Field label="Company" value={f.name} onChange={upd("name")}/>
        </div>
        <ExchangeToggle value={f.exchange} onChange={ex=>setF(p=>({...p,exchange:ex}))} sym={f.symbol}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="Shares" type="number" value={f.shares} onChange={upd("shares")}/>
          <Field label="Price (₹)" type="number" value={f.price} onChange={upd("price")}/>
        </div>
        <Field label="Date" icon="📅" type="date" value={f.date} onChange={upd("date")}/>
        <Field label="Note" icon="📝" value={f.note} onChange={upd("note")}/>
      </>)}
      <Btn full color="var(--blue)" style={{marginTop:4}} onClick={save}>Save Changes</Btn>
    </Sheet>
  );
}

function AdminPanel({db,onUpdate}){
  const[tab,setTab]=useState("members");
  const[toast,show]=useToast();
  const[confirm,setConfirm]=useState(null);
  const[editSheet,setEditSheet]=useState(null);
  // fetch state per symbol
  const[fetching,setFetching]=useState({});

  // member form
  const[uName,setUName]=useState(""),[uMob,setUMob]=useState(""),[uPw,setUPw]=useState("");
  // contribution form
  const[cUid,setCUid]=useState(""),[cAmt,setCAmt]=useState(""),[cDate,setCDate]=useState(todayStr()),[cNote,setCNote]=useState("");
  // trade form
  const[tType,setTType]=useState("BUY"),[tSym,setTSym]=useState(""),[tName,setTName]=useState("");
  const[tExch,setTExch]=useState("NSE"),[tSh,setTSh]=useState(""),[tPr,setTPr]=useState("");
  const[tDate,setTDate]=useState(todayStr()),[tNote,setTNote]=useState("");
  const[fetched,setFetched]=useState(null); // {sym,price}

  // fetch price for a specific symbol+exchange
  const doFetch=async(sym,exch)=>{
    setFetching(f=>({...f,[sym]:true}));
    const res=await fetchLivePrice(sym,exch);
    setFetching(f=>({...f,[sym]:false}));
    if(res.ok){dbSetPrice(db,sym,res.price);onUpdate();show(`${sym} (${res.ticker}): ₹${res.price.toFixed(2)} ✓`);return res.price;}
    else{show(`Could not fetch ${sym}. Check symbol / internet.`,false);return null;}
  };

  // fetch all current holdings
  const fetchAll=async()=>{
    const holdings=calcHoldings(db);
    if(!holdings.length)return show("No holdings to update",false);
    show("Fetching all prices…");
    for(const h of holdings)await doFetch(h.symbol,h.exchange);
    show("All prices updated ✓");
  };

  const tabDefs=[
    {id:"members",label:"Members",icon:"👥"},
    {id:"contributions",label:"Contributions",icon:"💰"},
    {id:"trades",label:"Trades",icon:"📊"},
  ];

  return(
    <div style={{paddingBottom:20,animation:"fadeIn .3s"}}>
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}
      {confirm&&<Confirm msg={confirm.msg} onYes={()=>{confirm.fn();setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
      {editSheet&&<EditSheet sheet={editSheet} db={db} onDone={()=>{setEditSheet(null);onUpdate();}} onClose={()=>setEditSheet(null)} show={show}/>}

      {/* Sub-tabs */}
      <div style={{display:"flex",gap:6,padding:"12px 12px 0",overflowX:"auto"}}>
        {tabDefs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",borderRadius:20,border:"1px solid var(--border)",
              background:tab===t.id?"var(--blue)":"var(--bg2)",color:tab===t.id?"#fff":"var(--text2)",
              fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"10px 12px 0"}}>

        {/* ── MEMBERS ── */}
        {tab==="members"&&(
          <>
          <Card>
            <Lbl>Add New Member</Lbl>
            <Field label="Full Name" icon="👤" value={uName} onChange={e=>setUName(e.target.value)} placeholder="e.g. Priya Kumar"/>
            <Field label="Mobile Number" icon="📱" type="tel" value={uMob} onChange={e=>setUMob(e.target.value.replace(/\D/g,"").slice(0,10))} placeholder="10-digit"/>
            <Field label="Set Password" icon="🔒" value={uPw} onChange={e=>setUPw(e.target.value)} placeholder="Min 6 characters"/>
            <Btn full onClick={()=>{
              if(!uName||!uMob||uMob.length<10||!uPw||uPw.length<6)return show("Fill all fields correctly",false);
              const r=dbAddUser(db,{mobile:uMob,pw:uPw,name:uName.trim()});
              if(r.ok){show("Member added ✓");setUName("");setUMob("");setUPw("");onUpdate();}else show(r.err,false);
            }}>Add Member</Btn>
          </Card>
          <Card>
            <Lbl>All Members ({db.users.length})</Lbl>
            {db.users.map((u,i)=>(
              <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<db.users.length-1?"1px solid var(--border)":"none"}}>
                <Avatar user={u} size={32}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</div>
                  <div style={{fontSize:10,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>📱 {u.mobile} · {u.joinedAt}</div>
                </div>
                <Pill c={u.role==="admin"?"var(--gold)":"var(--text3)"}>{u.role.toUpperCase()}</Pill>
                <button onClick={()=>setEditSheet({type:"user",data:u})} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:7,padding:"4px 8px",cursor:"pointer",color:"var(--text2)",fontSize:11}}>✏️</button>
                {u.id!=="u_admin"&&<button onClick={()=>setConfirm({msg:`Delete "${u.name}"? Their contributions will also be removed.`,fn:()=>{dbDeleteUser(db,u.id);onUpdate();show("Deleted");}})} style={{background:"var(--red-d)",border:"1px solid var(--red)44",borderRadius:7,padding:"4px 8px",cursor:"pointer",color:"var(--red-l)",fontSize:11}}>🗑</button>}
              </div>
            ))}
          </Card>
          </>
        )}

        {/* ── CONTRIBUTIONS ── */}
        {tab==="contributions"&&(
          <>
          <Card>
            <Lbl>Record Contribution</Lbl>
            <Sel label="Member" value={cUid} onChange={e=>setCUid(e.target.value)}>
              <option value="">— select member —</option>
              {db.users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
            </Sel>
            <Field label="Amount (₹)" icon="₹" type="number" value={cAmt} onChange={e=>setCAmt(e.target.value)} placeholder="25000"/>
            <Field label="Date" icon="📅" type="date" value={cDate} onChange={e=>setCDate(e.target.value)}/>
            <Field label="Note (optional)" icon="📝" value={cNote} onChange={e=>setCNote(e.target.value)} placeholder="e.g. Monthly SIP"/>
            <Btn full color="var(--green)" onClick={()=>{
              if(!cUid||!cAmt||!cDate)return show("Fill all fields",false);
              dbAddContrib(db,{userId:cUid,amount:cAmt,date:cDate,note:cNote});
              show("Contribution recorded ✓");setCAmt("");setCNote("");onUpdate();
            }}>Record Contribution</Btn>
          </Card>
          <Card>
            <Lbl>All Contributions ({db.contributions.length})</Lbl>
            {db.contributions.length===0&&<div style={{textAlign:"center",color:"var(--text3)",fontSize:13,padding:"12px 0"}}>None yet</div>}
            {[...db.contributions].sort((a,b)=>b.date.localeCompare(a.date)).map((c,i,arr)=>{
              const u=db.users.find(x=>x.id===c.userId);
              return(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:i<arr.length-1?"1px solid var(--border)":"none"}}>
                  {u&&<Avatar user={u} size={28}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{u?.name||"?"}</div>
                    <div style={{fontSize:10,color:"var(--text3)"}}>{c.date}{c.note?" · "+c.note:""}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--green)",fontFamily:"'DM Mono',monospace",marginRight:4}}>+{fmt(c.amount)}</div>
                  <button onClick={()=>setEditSheet({type:"contrib",data:c})} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:7,padding:"4px 7px",cursor:"pointer",color:"var(--text2)",fontSize:11}}>✏️</button>
                  <button onClick={()=>setConfirm({msg:`Delete ₹${c.amount} contribution by ${u?.name}?`,fn:()=>{dbDeleteContrib(db,c.id);onUpdate();show("Deleted");}})} style={{background:"var(--red-d)",border:"1px solid var(--red)44",borderRadius:7,padding:"4px 7px",cursor:"pointer",color:"var(--red-l)",fontSize:11}}>🗑</button>
                </div>
              );
            })}
          </Card>
          </>
        )}

        {/* ── TRADES ── */}
        {tab==="trades"&&(
          <>

            <Lbl>Record Trade</Lbl>

            <div style={{display:"flex",gap:8,marginBottom:10}}>
              {["BUY","SELL"].map(t=>(
                <button key={t} onClick={()=>setTType(t)}
                  style={{flex:1,padding:"9px",border:`1.5px solid ${tType===t?(t==="BUY"?"var(--green)":"var(--red)"):"var(--border)"}`,
                    borderRadius:9,background:tType===t?(t==="BUY"?"var(--green-d)":"var(--red-d)"):"var(--bg)",
                    color:tType===t?(t==="BUY"?"var(--green-l)":"var(--red-l)"):"var(--text3)",
                    fontSize:13,fontWeight:700,cursor:"pointer"}}>
                  {t==="BUY"?"📈 BUY":"📉 SELL"}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Field label="Symbol" icon="🔷" value={tSym} onChange={e=>{setTSym(e.target.value.toUpperCase());setFetched(null);}} placeholder="e.g. INFY"/>
              <Field label="Company name" value={tName} onChange={e=>setTName(e.target.value)} placeholder="optional"/>
            </div>
            {/* NSE / BSE */}
            <ExchangeToggle value={tExch} onChange={ex=>setTExch(ex)} sym={tSym}/>
            {/* Fetch live price button */}
            {tSym&&(
              <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
                <button onClick={async()=>{
                  if(!tSym)return;
                  const p=await doFetch(tSym,tExch);
                  if(p){setTPr(p.toFixed(2));setFetched({sym:tSym,price:p});}
                }} disabled={!!fetching[tSym]}
                  style={{padding:"8px 14px",background:"var(--purple-d)",border:"1px solid var(--purple)44",borderRadius:9,color:"var(--purple)",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                  {fetching[tSym]?<span style={{display:"inline-block",width:12,height:12,border:"2px solid var(--purple)",borderTopColor:"transparent",borderRadius:6,animation:"spin .8s linear infinite"}}/>:"⬇"} Fetch Live Price
                </button>
                {fetched&&fetched.sym===tSym&&<span style={{fontSize:11,color:"var(--green-l)",fontFamily:"'DM Mono',monospace"}}>₹{fetched.price.toFixed(2)} ✓</span>}
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Field label="No. of Shares" icon="#" type="number" value={tSh} onChange={e=>setTSh(e.target.value)} placeholder="100"/>
              <Field label="Price / Share (₹)" icon="₹" type="number" value={tPr} onChange={e=>setTPr(e.target.value)} placeholder="1500"/>
            </div>
            {tSh&&tPr&&(
              <div style={{background:tType==="BUY"?"var(--green-d)":"var(--red-d)",border:`1px solid ${tType==="BUY"?"var(--green)":"var(--red)"}33`,borderRadius:8,padding:"9px 13px",marginBottom:10,fontFamily:"'DM Mono',monospace"}}>
                <span style={{fontSize:10,color:"var(--text3)"}}>Total value: </span>
                <span style={{fontSize:15,fontWeight:700,color:tType==="BUY"?"var(--green-l)":"var(--red-l)"}}>{fmt(parseFloat(tSh||0)*parseFloat(tPr||0))}</span>
              </div>
            )}
            <Field label={`Date of ${tType==="BUY"?"Purchase":"Sell"}`} icon="📅" type="date" value={tDate} onChange={e=>setTDate(e.target.value)}/>
            <Field label="Note (optional)" icon="📝" value={tNote} onChange={e=>setTNote(e.target.value)} placeholder="Strategy / reason"/>
            <Btn full color={tType==="BUY"?"var(--green)":"var(--red)"} onClick={async()=>{
              if(!tSym||!tSh||!tPr||!tDate)return show("Fill all required fields",false);
              dbAddTrade(db,{symbol:tSym,name:tName,exchange:tExch,type:tType,shares:tSh,price:tPr,date:tDate,note:tNote});
              show(`${tType} trade recorded ✓`);
              const sym=tSym;
              setTSym("");setTName("");setTSh("");setTPr("");setTNote("");setFetched(null);onUpdate();

              const res=await fetchLivePrice(sym,tExch);
              if(res.ok){dbSetPrice(db,sym,res.price);onUpdate();show(`${tType} saved · Live: ₹${res.price.toFixed(2)} ✓`);}

                  style={{fontSize:11,fontWeight:700,padding:"6px 13px",background:"var(--purple-d)",border:"1px solid var(--purple)44",borderRadius:20,color:"var(--purple)",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  ⬇ Refresh All
                </button>
              </div>
              {calcHoldings(db).map((h,i,arr)=>{
                const pl=h.shares*h.currentPrice-h.shares*h.avgPrice;
                const pct=h.avgPrice>0?((h.currentPrice-h.avgPrice)/h.avgPrice*100).toFixed(1):"0.0";

                return(
                  <div key={h.symbol} style={{padding:"10px 0",borderBottom:i<arr.length-1?"1px solid var(--border)":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:13,fontWeight:700,color:"var(--text)",fontFamily:"'DM Mono',monospace"}}>{h.symbol}</span>
                          <span style={{fontSize:9,padding:"2px 6px",borderRadius:8,background:h.exchange==="NSE"?"#0d3d1a":"#0d1a3d",color:h.exchange==="NSE"?"#5eedb0":"#7fb3ff",fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{h.exchange}</span>
                          <span style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{h.symbol+exchSuffix(h.exchange)}</span>
                        </div>
                        <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>
                          {h.shares} sh · avg {fmt(h.avgPrice)} ·
                          <span style={{color:up?"var(--green)":"var(--red)",fontWeight:600,marginLeft:4}}>
                            {up?"+":""}{pct}% {up?"▲":"▼"}
                          </span>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:14,fontWeight:700,color:"var(--gold-l)",fontFamily:"'DM Mono',monospace"}}>{fmt(h.currentPrice)}</div>
                          <div style={{fontSize:9,color:up?"var(--green)":"var(--red)"}}>{up?"+":"-"}{fmt(pl)}</div>
                        </div>
                        <button onClick={()=>doFetch(h.symbol,h.exchange)} disabled={!!fetching[h.symbol]}
                          style={{padding:"6px 10px",background:"var(--purple-d)",border:"1px solid var(--purple)44",borderRadius:8,color:fetching[h.symbol]?"var(--text3)":"var(--purple)",fontSize:11,fontWeight:700,cursor:"pointer",minWidth:50}}>
                          {fetching[h.symbol]?<span style={{display:"inline-block",width:10,height:10,border:"2px solid var(--purple)",borderTopColor:"transparent",borderRadius:5,animation:"spin .8s linear infinite"}}/>:"⬇"}
                        </button>
                      </div>
                    </div>
                    {/* manual price input */}
                    <ManualPrice sym={h.symbol} onSet={(p)=>{dbSetPrice(db,h.symbol,p);onUpdate();show(`${h.symbol} price updated ✓`);}}/>
                  </div>
                );
              })}
            </Card>
          )}

          {/* All trades list */}
          <Card>
            <Lbl>All Trades ({db.trades.length})</Lbl>
            {db.trades.length===0&&<div style={{textAlign:"center",color:"var(--text3)",fontSize:13,padding:"12px 0"}}>No trades yet</div>}
            {[...db.trades].sort((a,b)=>b.date.localeCompare(a.date)).map((t,i,arr)=>(
              <div key={t.id} style={{padding:"9px 0",borderBottom:i<arr.length-1?"1px solid var(--border)":"none"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",flex:1,minWidth:0}}>
                    <Pill c={t.type==="BUY"?"var(--green)":"var(--red)"}>{t.type}</Pill>
                    <span style={{fontSize:13,fontWeight:700,color:"var(--text)",fontFamily:"'DM Mono',monospace"}}>{t.symbol}</span>
                    <span style={{fontSize:9,padding:"2px 5px",borderRadius:6,background:(t.exchange||"NSE")==="NSE"?"#0d3d1a":"#0d1a3d",color:(t.exchange||"NSE")==="NSE"?"#5eedb0":"#7fb3ff",fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{t.exchange||"NSE"}</span>
                    <span style={{fontSize:10,color:"var(--text3)"}}>{t.shares}sh @ {fmt(t.price)}</span>
                  </div>
                  <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                    <span style={{fontSize:11,fontWeight:700,color:t.type==="BUY"?"var(--red-l)":"var(--green-l)",fontFamily:"'DM Mono',monospace"}}>{t.type==="BUY"?"-":"+"}{fmt(t.shares*t.price)}</span>
                    <button onClick={()=>setEditSheet({type:"trade",data:t})} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:7,padding:"3px 7px",cursor:"pointer",color:"var(--text2)",fontSize:11}}>✏️</button>
                    <button onClick={()=>setConfirm({msg:`Delete ${t.type} ${t.symbol} trade?`,fn:()=>{dbDeleteTrade(db,t.id);onUpdate();show("Deleted");}})} style={{background:"var(--red-d)",border:"1px solid var(--red)44",borderRadius:7,padding:"3px 7px",cursor:"pointer",color:"var(--red-l)",fontSize:11}}>🗑</button>
                  </div>
                </div>
                <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{t.date}{t.note?" · "+t.note:""}</div>
              </div>
            ))}
          </Card>
          </>
        )}
      </div>
    </div>
  );
}

function ManualPrice({sym,onSet}){
  const[v,setV]=useState("");
  return(
    <div style={{display:"flex",gap:6,marginTop:6}}>
      <input type="number" value={v} onChange={e=>setV(e.target.value)} placeholder="Enter price manually (₹)"
        style={{flex:1,padding:"7px 10px",border:"1px solid var(--border2)",borderRadius:8,background:"var(--bg3)",color:"var(--text)",fontSize:12,outline:"none"}}/>
      <button onClick={()=>{if(v&&parseFloat(v)>0){onSet(parseFloat(v));setV("");}}}
        style={{padding:"7px 12px",background:"var(--blue-d)",border:"1px solid var(--blue)44",borderRadius:8,color:"var(--blue-l)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Set</button>
    </div>
  );
}

/* ═══════════════════════════════ ACCOUNT TAB ════════════════════════════════ */
function AccountTab({db,user,pnl,onLogout}){
  const me=pnl.perUser.find(u=>u.user.id===user.id)||{contrib:0,pl:0,plPct:"0.00",sharePct:"0.0",currentValue:0,realized:0,unrealized:0,cashShare:0};
  const myContribs=[...db.contributions].filter(c=>c.userId===user.id).sort((a,b)=>b.date.localeCompare(a.date));

            <span style={{fontSize:10,fontWeight:700,color:r.color,border:`1px solid ${r.color}44`,padding:"3px 9px",borderRadius:15}}>⬇ XLSX</span>

      </Card>
      {/* My contributions */}
      <Card>
        <Lbl>My Contributions</Lbl>
        {myContribs.length===0&&<div style={{textAlign:"center",color:"var(--text3)",fontSize:13,padding:"14px 0"}}>No contributions yet</div>}

          <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<myContribs.length-1?"1px solid var(--border)":"none"}}>

      <Btn ghost full color="var(--red)" onClick={onLogout}>Sign Out</Btn>

  );
}

/* ═══════════════════════════════ APP ════════════════════════════════ */
function App(){
  const[db,setDB]=useState(()=>loadDB());
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState("home");
  const onUpdate=useCallback(()=>setDB(loadDB()),[]);
  const pnl=useMemo(()=>calcPnL(db),[db]);
  const isAdmin=user?.role==="admin";

  // ── Price refresh strategy ──
  // 1) Real API fetch (Yahoo Finance) every 60 s — avoids rate-limits
  // 2) Micro-tick every 3 s — applies tiny realistic drift to last fetched price
  //    so the UI feels live even between real fetches
  useEffect(()=>{
    if(!user)return;

    // Real fetch from Yahoo Finance
    const realFetch=async()=>{
      const holdings=calcHoldings(db);
      if(!holdings.length)return;
      let updated=false;
      for(const h of holdings){
        const res=await fetchLivePrice(h.symbol,h.exchange);
        if(res.ok){dbSetPrice(db,h.symbol,res.price);updated=true;}
      }
      if(updated)setDB(loadDB());
    };

    // 3-second micro-tick: small random drift ±0.15% around last known price
    const microTick=()=>{
      const holdings=calcHoldings(db);
      if(!holdings.length)return;
      let changed=false;
      holdings.forEach(h=>{
        const cur=db.prices[h.symbol];
        if(cur===undefined)return;
        const drift=(Math.random()-0.495)*cur*0.0015; // ±0.15%
        const next=Math.max(0.01,parseFloat((cur+drift).toFixed(4)));
        db.prices[h.symbol]=next;
        if(!db.priceHistory[h.symbol])db.priceHistory[h.symbol]=[];
        db.priceHistory[h.symbol].push({t:Date.now(),p:next});
        if(db.priceHistory[h.symbol].length>40)db.priceHistory[h.symbol]=db.priceHistory[h.symbol].slice(-40);
        changed=true;
      });
      if(changed){try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(_){}setDB(loadDB());}
    };

    realFetch(); // fetch immediately on login
    const realId=setInterval(realFetch,60000);   // real API every 60 s
    const microId=setInterval(microTick,3000);   // UI tick every 3 s
    return()=>{clearInterval(realId);clearInterval(microId);};
  },[user]);

  const tabs=[
    {id:"home",label:"Home",icon:"🏠"},
    {id:"pnl",label:"P & L",icon:"📊"},
    ...(isAdmin?[{id:"admin",label:"Admin",icon:"⚙️"}]:[]),
    {id:"account",label:"Account",icon:"👤"},
  ];

  const adminNeedsSetup=db.users.find(u=>u.id==="u_admin")?.needsSetup===true;
  if(adminNeedsSetup)return<SetupScreen db={db} onDone={()=>setDB(loadDB())}/>;
  if(!user)return<LoginScreen db={db} onLogin={u=>{setUser(u);setTab("home");}}/>;

  return(
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"12px 16px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:"var(--text)",letterSpacing:-.3}}>InvestClub</div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:1,fontFamily:"'DM Mono',monospace"}}>
            <span style={{display:"inline-block",width:5,height:5,borderRadius:3,background:"var(--green)",marginRight:4,animation:"blink 1.4s infinite"}}/>
            {db.users.length} members · {pnl.holdings.length} stocks
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginBottom:1}}>GROUP P&L</div>
          <div style={{fontSize:14,fontWeight:700,color:plColor(pnl.totalPL),fontFamily:"'DM Mono',monospace"}}>{plSign(pnl.totalPL)}{fmt(pnl.totalPL)}</div>
          <div style={{fontSize:9,color:"var(--gold)"}}>💰 Cash: {fmt(pnl.cash)}</div>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:68}}>
        {tab==="home"&&<Dashboard db={db} user={user} pnl={pnl}/>}
        {tab==="pnl"&&<PnLTab pnl={pnl} user={user}/>}
        {tab==="admin"&&isAdmin&&<AdminPanel db={db} onUpdate={onUpdate}/>}
        {tab==="account"&&<AccountTab db={db} user={user} pnl={pnl} onLogout={()=>setUser(null)}/>}
      </div>
      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"var(--bg2)",borderTop:"1px solid var(--border)",display:"flex",zIndex:20}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:"9px 0 11px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
              borderTop:`2px solid ${tab===t.id?"var(--blue)":"transparent"}`,color:tab===t.id?"var(--blue)":"var(--text3)",transition:"color .15s"}}>
            <span style={{fontSize:17}}>{t.icon}</span>
            <span style={{fontSize:8,fontWeight:700,letterSpacing:.4,fontFamily:"'DM Mono',monospace"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// ── PWA Install Prompt ──
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();deferredPrompt=e;
  showInstallBanner();
});

function showInstallBanner(){
  if(document.getElementById("ic-install-banner"))return;
  const banner=document.createElement("div");
  banner.id="ic-install-banner";
  banner.innerHTML=`
    <div style="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:388px;
      background:linear-gradient(135deg,#1a3a7a,#0d3d28);border:1px solid #4f8ef7;border-radius:14px;
      padding:14px 16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.6);display:flex;align-items:center;gap:12px;animation:fadeIn .3s">
      <span style="font-size:28px;flex-shrink:0">📲</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#f0f2ff">Install InvestClub</div>
        <div style="font-size:11px;color:#9ba3c4;margin-top:2px">Add to home screen for app-like experience</div>
      </div>
      <button onclick="installApp()" style="padding:8px 14px;background:#4f8ef7;color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">Install</button>
      <button onclick="dismissBanner()" style="background:none;border:none;color:#636b8a;cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0">✕</button>
    </div>`;
  document.body.appendChild(banner);
}

window.installApp=async function(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  dismissBanner();
};
window.dismissBanner=function(){
  const b=document.getElementById("ic-install-banner");
  if(b)b.remove();
};

// ── iOS install hint (Safari doesn't support beforeinstallprompt) ──
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone=window.navigator.standalone===true;
const dismissed=sessionStorage.getItem("ic-ios-dismissed");
if(isIOS&&!isInStandalone&&!dismissed){
  setTimeout(()=>{
    if(document.getElementById("ic-install-banner"))return;
    const banner=document.createElement("div");
    banner.id="ic-install-banner";
    banner.innerHTML=`
      <div style="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:388px;
        background:linear-gradient(135deg,#1a3a7a,#0d3d28);border:1px solid #4f8ef7;border-radius:14px;
        padding:14px 16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:fadeIn .3s">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <span style="font-size:26px">📲</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:#f0f2ff">Install on iPhone</div>
            <div style="font-size:11px;color:#9ba3c4;margin-top:2px">Open in Safari to install</div>
          </div>
          <button onclick="sessionStorage.setItem('ic-ios-dismissed','1');dismissBanner()" style="background:none;border:none;color:#636b8a;cursor:pointer;font-size:18px">✕</button>
        </div>
        <div style="background:#0f1117;border-radius:9px;padding:10px 12px;font-size:12px;color:#9ba3c4;line-height:1.7">
          1. Tap the <strong style="color:#4f8ef7">Share</strong> button <strong style="color:#f0f2ff">⎙</strong> in Safari<br/>
          2. Scroll down and tap <strong style="color:#4f8ef7">"Add to Home Screen"</strong><br/>
          3. Tap <strong style="color:#4f8ef7">"Add"</strong> — InvestClub appears on your home screen 🎉
        </div>
      </div>`;
    document.body.appendChild(banner);
  },2000);
}

// ── Service Worker (offline cache) ──
if("serviceWorker" in navigator){
  const swCode=`
    const CACHE="investclub-v1";
    self.addEventListener("install",e=>e.waitUntil(
      caches.open(CACHE).then(c=>c.addAll(["${window.location.href}"]))
    ));
    self.addEventListener("fetch",e=>e.respondWith(
      fetch(e.request).catch(()=>caches.match(e.request))
    ));
  `;
  const blob=new Blob([swCode],{type:"text/javascript"});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
